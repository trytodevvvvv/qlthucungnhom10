<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Pet Shop Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="card auth-card">
            <h2 style="margin-bottom: 24px; color: var(--primary-dark);">
                <i class="fa-solid fa-paw"></i> PetShop Pro
            </h2>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}
            
            <form method="POST">
                <div class="form-group">
                    <label style="font-weight: 500; display: block; margin-bottom: 8px;">Tên đăng nhập</label>
                    <input type="text" name="username" class="form-control" required placeholder="Nhập tài khoản...">
                </div>
                <div class="form-group">
                    <label style="font-weight: 500; display: block; margin-bottom: 8px;">Mật khẩu</label>
                    <input type="password" name="password" class="form-control" required placeholder="Nhập mật khẩu...">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;">Đăng Nhập</button>
            </form>
        </div>
    </div>
</body>
</html>
