{% extends "base.html" %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
    <h2>{% if pet %}Cập nhật Thú Cưng{% else %}Thêm Thú Cưng{% endif %}</h2>
    <a href="{{ url_for('pets.list_pets') }}" class="btn" style="background: #eee;">Quay lại</a>
</div>

<div class="card" style="max-width: 600px;">
    <form method="POST" action="">
        <div class="form-group">
            <label style="display: block; margin-bottom: 8px; font-weight: 500;">Chủ sở hữu <span style="color: red;">*</span></label>
            <select name="customer_id" class="form-control" required>
                <option value="">-- Chọn khách hàng --</option>
                {% for c in customers %}
                <option value="{{ c.id }}" {% if pet and pet.customer_id == c.id %}selected{% endif %}>{{ c.name }} ({{ c.phone }})</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label style="display: block; margin-bottom: 8px; font-weight: 500;">Tên Thú Cưng <span style="color: red;">*</span></label>
            <input type="text" name="name" class="form-control" value="{{ pet.name if pet else '' }}" required>
        </div>
        
        <div style="display: flex; gap: 16px;">
            <div class="form-group" style="flex: 1;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Loài (Chó/Mèo...)</label>
                <input type="text" name="species" class="form-control" value="{{ pet.species if pet else '' }}">
            </div>
            <div class="form-group" style="flex: 1;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Giống</label>
                <input type="text" name="breed" class="form-control" value="{{ pet.breed if pet else '' }}">
            </div>
        </div>

        <div class="form-group">
            <label style="display: block; margin-bottom: 8px; font-weight: 500;">Cân nặng (kg)</label>
            <input type="number" step="0.1" name="weight" class="form-control" value="{{ pet.weight if pet else '' }}">
        </div>

        <div class="form-group">
            <label style="display: block; margin-bottom: 8px; font-weight: 500;">Ghi chú sức khỏe</label>
            <textarea name="health_notes" class="form-control" style="height: 80px; resize: vertical;">{{ pet.health_notes if pet else '' }}</textarea>
        </div>

        <div style="margin-top: 24px;">
            <button type="submit" class="btn btn-primary" style="width: 100%;">Lưu Thú Cưng</button>
        </div>
    </form>
</div>
{% endblock %}
