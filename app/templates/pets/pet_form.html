{% extends "base.html" %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
    <h2>{% if pet %}Cập nhật Thú Cưng{% else %}Thêm Thú Cưng{% endif %}</h2>
    <a href="{{ url_for('pets.list_pets') }}" class="btn" style="background: #eee;">Quay lại</a>
</div>

<div class="card" style="max-width: 600px;">
    <form method="POST" action="">
        <div class="form-group">
            <label style="display: block; margin-bottom: 8px; font-weight: 500;">Thông tin khách hàng <span style="color: red;">*</span></label>
            <input type="text" name="customer_identifier" list="customers_list" class="form-control" placeholder="Nhập tên khách hàng để tìm kiếm..." value="{{ pet.owner.phone ~ ' - ' ~ pet.owner.name if pet else '' }}" required autocomplete="off">
            <datalist id="customers_list">
                {% for c in customers %}
                <option value="{{ c.phone }} - {{ c.name }}"></option>
                {% endfor %}
            </datalist>
            <small style="color: var(--text-muted); display: block; margin-top: 4px;">Có thể nhập tên để hệ thống tự gợi ý.</small>
        </div>

        <div class="form-group">
            <label style="display: block; margin-bottom: 8px; font-weight: 500;">Tên Thú Cưng <span style="color: red;">*</span></label>
            <input type="text" name="name" class="form-control" value="{{ pet.name if pet else '' }}" required>
        </div>
        
        <div style="display: flex; gap: 16px;">
            <div class="form-group" style="flex: 1;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Loài (Chó/Mèo...)</label>
                <select name="species" class="form-control">
                    <option value="">-- Chọn loài --</option>
                    <option value="Chó" {% if pet and pet.species == 'Chó' %}selected{% endif %}>Chó</option>
                    <option value="Mèo" {% if pet and pet.species == 'Mèo' %}selected{% endif %}>Mèo</option>
                    <option value="Chuột Hamster" {% if pet and pet.species == 'Chuột Hamster' %}selected{% endif %}>Chuột Hamster</option>
                    <option value="Thỏ" {% if pet and pet.species == 'Thỏ' %}selected{% endif %}>Thỏ</option>
                    <option value="Chim" {% if pet and pet.species == 'Chim' %}selected{% endif %}>Chim</option>
                    <option value="Khác" {% if pet and pet.species and pet.species not in ['Chó', 'Mèo', 'Chuột Hamster', 'Thỏ', 'Chim'] %}selected{% endif %}>Khác</option>
                </select>
            </div>
            <div class="form-group" style="flex: 1;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Giống</label>
                <input type="text" name="breed" class="form-control" value="{{ pet.breed if pet else '' }}">
            </div>
        </div>

        <div class="form-group">
            <label style="display: block; margin-bottom: 8px; font-weight: 500;">Cân nặng (kg)</label>
            <input type="number" step="0.1" name="weight" class="form-control" value="{{ pet.weight if pet else '' }}">
        </div>

        <div class="form-group">
            <label style="display: block; margin-bottom: 8px; font-weight: 500;">Ghi chú sức khỏe</label>
            <textarea name="health_notes" class="form-control" style="height: 80px; resize: vertical;">{{ pet.health_notes if pet else '' }}</textarea>
        </div>

        <div style="margin-top: 24px;">
            <button type="submit" class="btn btn-primary" style="width: 100%;">Lưu Thú Cưng</button>
        </div>
    </form>
</div>
{% endblock %}
