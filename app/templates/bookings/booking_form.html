{% extends "base.html" %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
    <h2>{% if booking %}Cập nhật Lịch Hẹn{% else %}Tạo Lịch Hẹn Mới{% endif %}</h2>
    <a href="{{ url_for('bookings.list_bookings') }}" class="btn" style="background: #eee;">Quay lại</a>
</div>

<div class="card" style="max-width: 600px;">
    <form method="POST" action="">
        <div class="form-group">
            <label style="display: block; margin-bottom: 8px; font-weight: 500;">
                Thông tin khách hàng <span style="color: red;">*</span>
                <a href="{{ url_for('pets.add_customer') }}" target="_blank" style="float: right; font-size: 0.85rem; font-weight: normal; color: var(--primary);"><i class="fa-solid fa-plus"></i> Thêm KH mới</a>
            </label>
            <input type="text" name="customer_identifier" id="customer_identifier" list="customers_list" class="form-control" placeholder="Nhập tên khách hàng để tìm kiếm..." value="{{ booking.customer.phone ~ ' - ' ~ booking.customer.name if booking else '' }}" required autocomplete="off">
            <datalist id="customers_list">
                {% for c in customers %}
                <option value="{{ c.phone }} - {{ c.name }}"></option>
                {% endfor %}
            </datalist>
            <small style="color: var(--text-muted); display: block; margin-top: 4px;">Có thể nhập tên để hệ thống tự gợi ý.</small>
        </div>
        
        <div class="form-group">
            <label style="display: block; margin-bottom: 8px; font-weight: 500;">
                Tên thú cưng <span style="color: red;">*</span>
                <a href="{{ url_for('pets.add_pet') }}" target="_blank" style="float: right; font-size: 0.85rem; font-weight: normal; color: var(--primary);"><i class="fa-solid fa-plus"></i> Thêm thú cưng mới</a>
            </label>
            <input type="text" name="pet_name" id="pet_name" list="pets_list" class="form-control" placeholder="Nhập tên thú cưng để tìm kiếm..." value="{{ booking.pet.name if booking else '' }}" required autocomplete="off">
            <datalist id="pets_list">
                {% for p in pets %}
                <option value="{{ p.name }}"></option>
                {% endfor %}
            </datalist>
            <small style="color: var(--text-muted); display: block; margin-top: 4px;">Hệ thống sẽ gợi ý tên thú cưng hiện có.</small>
        </div>

        <div class="form-group">
            <label style="display: block; margin-bottom: 8px; font-weight: 500;">Dịch vụ <span style="color: red;">*</span></label>
            <select name="service_id" class="form-control" required>
                <option value="">-- Chọn dịch vụ --</option>
                {% for s in services %}
                <option value="{{ s.id }}" {% if booking and booking.service_id == s.id %}selected{% endif %}>{{ s.name }} ({{ "{:,.0f}".format(s.price) }}đ)</option>
                {% endfor %}
            </select>
        </div>

        <div style="display: flex; gap: 16px;">
            <div class="form-group" style="flex: 1;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Thời gian hẹn <span style="color: red;">*</span></label>
                <input type="datetime-local" name="booking_time" class="form-control" 
                       value="{{ booking.booking_time.strftime('%Y-%m-%dT%H:%M') if booking and booking.booking_time else '' }}" required>
            </div>
            <div class="form-group" style="flex: 1;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Phân công nhân viên</label>
                <select name="employee_id" class="form-control">
                    <option value="">-- Tùy chọn --</option>
                    {% for emp in employees %}
                    <option value="{{ emp.id }}" {% if booking and booking.employee_id == emp.id %}selected{% endif %}>{{ emp.full_name or emp.username }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-group">
            <label style="display: block; margin-bottom: 8px; font-weight: 500;">Ghi chú thêm</label>
            <textarea name="notes" class="form-control" placeholder="Ghi chú thêm..." style="height: 100px; resize: vertical;">{{ booking.notes if booking else '' }}</textarea>
        </div>

        <div style="margin-top: 24px;">
            <button type="submit" class="btn btn-primary" style="width: 100%;">Lưu Lịch Hẹn</button>
        </div>
    </form>
</div>


</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const customerInput = document.getElementById('customer_identifier');
    const petsList = document.getElementById('pets_list');
    
    // Lưu lại danh sách thú cưng gốc
    const originalPetsHTML = petsList.innerHTML;

    function fetchPetsForCustomer(identifier) {
        if (identifier && identifier.includes(' - ')) {
            const phone = identifier.split(' - ')[0].trim();
            fetch(`/api/pets_by_customer?phone=${encodeURIComponent(phone)}`)
                .then(res => res.json())
                .then(data => {
                    petsList.innerHTML = '';
                    data.forEach(petName => {
                        const option = document.createElement('option');
                        option.value = petName;
                        petsList.appendChild(option);
                    });
                })
                .catch(err => console.error('Lỗi khi lấy danh sách thú cưng:', err));
        } else {
            // Khôi phục lại toàn bộ thú cưng nếu không có khách hàng cụ thể
            petsList.innerHTML = originalPetsHTML;
        }
    }

    customerInput.addEventListener('change', function() {
        fetchPetsForCustomer(this.value);
    });

    // Chạy khi load trang nếu có sẵn dữ liệu khách hàng (Trường hợp sửa lịch hẹn)
    if (customerInput.value) {
        fetchPetsForCustomer(customerInput.value);
    }
});
</script>

{% endblock %}
