{% extends "base.html" %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
    <h2>{% if booking %}Cập nhật Lịch Hẹn{% else %}Tạo Lịch Hẹn Mới{% endif %}</h2>
    <a href="{{ url_for('bookings.list_bookings') }}" class="btn" style="background: #eee;">Quay lại</a>
</div>

<div class="card" style="max-width: 600px;">
    <form method="POST" action="">
        <div class="form-group">
            <label style="display: block; margin-bottom: 8px; font-weight: 500;">Khách hàng <span style="color: red;">*</span></label>
            <select name="customer_id" class="form-control" required id="customer_select">
                <option value="">-- Chọn khách hàng --</option>
                {% for c in customers %}
                <option value="{{ c.id }}" {% if booking and booking.customer_id == c.id %}selected{% endif %}>{{ c.name }} ({{ c.phone }})</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label style="display: block; margin-bottom: 8px; font-weight: 500;">Thú cưng <span style="color: red;">*</span></label>
            <select name="pet_id" class="form-control" required id="pet_select">
                <option value="">-- Chọn thú cưng --</option>
                {% for p in pets %}
                <option value="{{ p.id }}" data-customer="{{ p.customer_id }}" {% if booking and booking.pet_id == p.id %}selected{% endif %}>{{ p.name }} - {{ p.species }}</option>
                {% endfor %}
            </select>
            <small style="color: var(--text-muted);">Note: Hiện tại hiển thị tất cả thú cưng.</small>
        </div>

        <div class="form-group">
            <label style="display: block; margin-bottom: 8px; font-weight: 500;">Dịch vụ <span style="color: red;">*</span></label>
            <select name="service_id" class="form-control" required>
                <option value="">-- Chọn dịch vụ --</option>
                {% for s in services %}
                <option value="{{ s.id }}" {% if booking and booking.service_id == s.id %}selected{% endif %}>{{ s.name }} ({{ "{:,.0f}".format(s.price) }}đ)</option>
                {% endfor %}
            </select>
        </div>

        <div style="display: flex; gap: 16px;">
            <div class="form-group" style="flex: 1;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Thời gian hẹn <span style="color: red;">*</span></label>
                <input type="datetime-local" name="booking_time" class="form-control" 
                       value="{{ booking.booking_time.strftime('%Y-%m-%dT%H:%M') if booking and booking.booking_time else '' }}" required>
            </div>
            <div class="form-group" style="flex: 1;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Phân công nhân viên</label>
                <select name="employee_id" class="form-control">
                    <option value="">-- Tùy chọn --</option>
                    {% for emp in employees %}
                    <option value="{{ emp.id }}" {% if booking and booking.employee_id == emp.id %}selected{% endif %}>{{ emp.username }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-group">
            <label style="display: block; margin-bottom: 8px; font-weight: 500;">Trạng thái</label>
            <select name="status" class="form-control">
                <option value="Pending" {% if booking and booking.status == 'Pending' %}selected{% endif %}>Chờ xử lý</option>
                <option value="Confirmed" {% if booking and booking.status == 'Confirmed' %}selected{% endif %}>Đã xác nhận</option>
                <option value="In Progress" {% if booking and booking.status == 'In Progress' %}selected{% endif %}>Đang làm</option>
                <option value="Completed" {% if booking and booking.status == 'Completed' %}selected{% endif %}>Hoàn thành</option>
                <option value="Cancelled" {% if booking and booking.status == 'Cancelled' %}selected{% endif %}>Đã hủy</option>
            </select>
        </div>

        <div class="form-group">
            <label style="display: block; margin-bottom: 8px; font-weight: 500;">Ghi chú thêm</label>
            <textarea name="notes" class="form-control" style="height: 80px; resize: vertical;">{{ booking.notes if booking else '' }}</textarea>
        </div>

        <div style="margin-top: 24px;">
            <button type="submit" class="btn btn-primary" style="width: 100%;">Lưu Lịch Hẹn</button>
        </div>
    </form>
</div>

<script>
    // Simple script to filter pets based on selected customer
    document.getElementById('customer_select').addEventListener('change', function() {
        const customerId = this.value;
        const petOptions = document.querySelectorAll('#pet_select option[data-customer]');
        
        petOptions.forEach(opt => {
            if (!customerId || opt.getAttribute('data-customer') === customerId) {
                opt.style.display = 'block';
            } else {
                opt.style.display = 'none';
            }
        });
        document.getElementById('pet_select').value = ""; // reset pet selection
    });
</script>
{% endblock %}
