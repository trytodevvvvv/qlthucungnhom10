{% extends "base.html" %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
    <h2>{% if service %}Cập nhật Dịch Vụ{% else %}Thêm Dịch Vụ{% endif %}</h2>
    <a href="{{ url_for('services.list_services') }}" class="btn" style="background: #eee;">Quay lại</a>
</div>

<div class="card" style="max-width: 600px;">
    <form method="POST" action="">
        <div class="form-group">
            <label style="display: block; margin-bottom: 8px; font-weight: 500;">Tên dịch vụ <span style="color: red;">*</span></label>
            <input type="text" name="name" class="form-control" value="{{ service.name if service else '' }}" required>
        </div>
        
        <div class="form-group">
            <label style="display: block; margin-bottom: 8px; font-weight: 500;">Danh mục <span style="color: red;">*</span></label>
            <select name="category_id" class="form-control" required>
                <option value="">-- Chọn danh mục --</option>
                {% for c in categories %}
                <option value="{{ c.id }}" {% if service and service.category_id == c.id %}selected{% endif %}>{{ c.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div style="display: flex; gap: 16px;">
            <div class="form-group" style="flex: 1;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Đơn giá (VNĐ) <span style="color: red;">*</span></label>
                <input type="number" name="price" class="form-control" value="{{ service.price if service else '0' }}" required>
            </div>
            <div class="form-group" style="flex: 1;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Thời lượng (Phút)</label>
                <input type="number" name="duration_minutes" class="form-control" value="{{ service.duration_minutes if service else '30' }}">
            </div>
        </div>

        <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" name="is_active" id="is_active" {% if not service or service.is_active %}checked{% endif %}>
            <label for="is_active" style="font-weight: 500; cursor: pointer;">Đang cung cấp</label>
        </div>

        <div style="margin-top: 24px;">
            <button type="submit" class="btn btn-primary" style="width: 100%;">Lưu Dịch Vụ</button>
        </div>
    </form>
</div>
{% endblock %}
